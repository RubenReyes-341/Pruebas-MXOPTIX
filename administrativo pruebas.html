<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Información del sitio -->
  <meta name="description" content="Sistema gestor de expedientes para franquicias MX OPTIX">
  <meta name="author" content="MX OPTIX">

  <title>MX OPTIX | Panel administrativo</title>

  <link rel="icon" href="assets/Logo.jpeg">

  <link rel="stylesheet" href="css/estilos.css">
</head>

<body>

  <!-- =========================
       HEADER / BARRA DE NAVEGACION
       Contiene logo, menú y logout
  ========================= -->
  <header class="navbar">

    <!-- Barra superior: logo + botón + hamburguesa -->
    <div class="container navbar-top">

      <!-- Logo de la empresa -->
      <div class="logo">
        <a href="menu_principal.html"><img src="assets/logo transparente bueno.png" alt="MX OPTIX"></a>
      </div>

      <!-- Botón cerrar sesión (visible en desktop) -->
      <button class="btn logout-desktop">
        Cerrar sesión
      </button>

      <!-- Botón menú hamburguesa (solo móvil) -->
      <div class="menu-toggle">
        ☰
      </div>

    </div>

    <!-- =========================
         MENÚ DE NAVEGACIÓN
         Cambia entre móvil (columna)
         y pc (fila)
    ========================= -->
    <nav class="container navbar-menu">
      <a href="registro.html">Registrar Expediente</a>
      <a href="buscar.html">Buscar Expedientes</a>
      <a href="pedidos.html">Seguimiento de Pedidos</a>
      <a href="administrativo pruebas.html">Panel Administrativo</a>

    </nav>

  </header>

  <!-- =========================
       CONTENIDO 
       Aquí se pone la info jiji
  ========================= -->
  <main class="main">

    <div class="container">

      <section class="section">

        <section class="panel">

          <div class="panel-left">
            
            <div class="card">
              
              <h2 class="title">
                Gestión de empleados
              </h2>

              <button class="btn btn-primary">
                Registrar empleado
              </button>

              <table>
                <thead>

                  <tr>
                    <th>Nombre</th>
                    <th>Usuario</th>
                    <th>Rol</th>
                    <th>Acciones</th>
                  </tr>

                </thead>

                <tbody>

                  <tr>
                    <td>Ruben</td>
                    <td>El Reyes</td>
                    <td>Chambeador</td>
                    <td><button class="btn">Editar</button></td>
                  </tr>

                </tbody>
              </table>

            </div>

            <div class="card">
              
              <h2 class="title">
                Configuración de metas
              </h2>

              <table>
                <thead>

                <tr>
                  <th>Empleado</th>
                  <th>Meta semanal</th>
                  <th>Acción</th>
                </tr>

                </thead>
                <tbody>

                <tr>
                  <td>Ruben</td>
                  <td>10,000</td>
                  <td><button class="btn">Editar</button></td>
                </tr>

                </tbody>
              </table>

            </div>
          </div>

          <div class="panel-right">
            
            <div class="card">

              <h2 class="title">
                Estadísticas
              </h2>

              <div class="chart">Gráfica aquí</div>
              
            </div>
            
            <div class="card">

              <h2 class="title">
              Ventas generales
              </h2>

              <div class="chart">Gráfica aquí</div>

            </div>

          </div>
        
        </section>

      </section>

      <!-- Botón cerrar sesión (solo móvil) -->
      <button class="btn logout-mobile">Cerrar sesión</button>

    </div>

  </main>

  <!-- =========================
       SCRIPT
  ========================= -->
  <script src="js/app.js"></script>

</body>
</html>
