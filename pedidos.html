<!-- =========================

<!--
ESTRUCTURA GENERAL

- Todo el contenido debe ir dentro de:
  <section class="section">

- Siempre usar:
  <div class="container">
  para centrar contenido


COMPONENTES BÁSICOS

Botones:
- Usar siempre:
  class="btn"
- Ejemplo:
  <button class="btn">Guardar</button>

Títulos:
- Usar:
  class="title"
- Ejemplo:
  <h1 class="title">Registrar expediente</h1>

Secciones:
- Usar:
  class="section"
- Ejemplo:
  <section class="section">...</section>


PRIMERO PARA TELEFONO

1. Primero hacer diseño para celular
2. Luego adaptar a PC con @media en CSS

Ejemplo CSS:

.elemento {
  width: 100%;
}

@media (min-width: 768px) {
  .elemento {
    width: 50%;
  }
}
