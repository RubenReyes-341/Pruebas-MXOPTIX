<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sistema gestor de expedientes para franquicias MX OPTIXs">
  <meta name="author" content="MX OPTIX">

  <title>MX OPTIX | Sistema de gestión de empleados</title>

  <link rel="icon" href="assets/Logo.jpeg">
  <link rel="stylesheet" href="CSS/estilos.css">
</head>

<body>

  <main class="main login-page">
  <div class="container">

    <!-- CONTENEDOR PRINCIPAL LOGIN -->
    <div class="login">

      <!-- LADO IZQUIERDO (LOGO) -->
      <div class="login-left">
        <img src="./assets/logo transparente bueno.png" alt="MX OPTIX">
      </div>

      <!-- LADO DERECHO (FORMULARIO) -->
      <div class="login-right">

        <div class="card login-card">
          
          <h2 class="title">Iniciar Sesión</h2>

          <h3>
            Bienvenido al sistema de gestión de MX OPTIX.
          </h3>

          <div class="form-group">
            <label>Usuario</label>
            <input type="text" class="input" placeholder="Nombre de usuario">
          </div>

          <div class="form-group">
            <label>Contraseña</label>
            <input type="password" class="input" placeholder="Ingrese su contraseña">
          </div>

          <button class="btn btn-primary">
            <a href="menu_principal.html">Iniciar sesión</a>
          </button>

        </div>

      </div>

    </div>

  </div>
</main>

  <footer class="footer">
  </footer>

</body>
</html>
